server:
  port: 8084
spring:
  application:
    name: payment
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/corepay_payment_db
    username: user
    password: user1234

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092 # 카프카 서버 주소
    consumer:
      group-id: ${spring.application.name}-group # 각 서버의 고유 그룹 이름
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring:
        json:
          trusted:
            packages: "*"
          use:
            type:
              headers: false
          value:
            default:
              type: org.example.corepaypaymentservice.dto.event.OrderCreatedEvent

  threads:
    virtual:
      enabled: true

  management:
    endpoints:
      web:
        exposure:
          include: prometheus, health, info, metrics # 프로메테우스가 접근할 수 있도록 엔드포인트 개방
    metrics:
      tags:
        application: ${spring.application.name} # 그라파나 대시보드에서 서버 필터링할 때 사용

  logging:
    level:
      org.hibernate.orm.jdbc.bind: TRACE